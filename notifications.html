  <style>
    body {
      background-color: #f5f7fb;
      margin: 0;
      font-family: "Segoe UI", sans-serif;
    }

    .notification-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    .notification-item {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .notification-item:last-child {
      border-bottom: none;
    }

    .unread {
      background-color: #eef2ff;
    }

    .icon-box {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
    }

    .icon-course {
      background: #4f46e5;
    }

    .icon-alert {
      background: #ef4444;
    }

    .icon-update {
      background: #22c55e;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 260px;
      height: 100vh;
      background: #ffffff;
      box-shadow: 2px 0 10px rgba(0, 0, 0, .05);
      position: fixed;
      display: flex;
      flex-direction: column;
    }

    .sidebar .nav-link {
      color: #374151;
      border-radius: 10px;
      margin: 4px 12px;
      font-weight: 500;
      position: relative;
      transition: all 0.25s ease;
    }

    /* Hover */
    .sidebar .nav-link:hover {
      background: #f1f5ff;
      color: #4f46e5;
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
    }

    .sidebar .nav-link i {
      margin-right: 10px;
      transition: all 0.25s ease;
    }

    .sidebar .nav-link:hover i {
      transform: scale(1.1);
    }

    /* Left border effect */
    .sidebar .nav-link::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 60%;
      background: #4f46e5;
      border-radius: 0 4px 4px 0;
      transition: width 0.25s ease;
    }

    .sidebar .nav-link:hover::before {
      width: 4px;
    }

    /* Active */
    .sidebar .nav-link.active {
      background: linear-gradient(90deg, #eef2ff, #f8faff);
      color: #4f46e5;
    }

    .sidebar .nav-link.active::before {
      width: 4px;
    }

    /* ===== Header ===== */
    .topbar {
      height: 64px;
      background: #ffffff;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
      margin-left: 260px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .search-input {
      max-width: 320px;
    }

    /* ===== Content ===== */
    .content {
      margin-left: 260px;
      margin-top: 0px;
      padding: 24px;
    }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
  </style>
<script src="APP_SCRIPT/uiMenu.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script src="APP_SCRIPT/uiNotifications.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>

    $(document).ready(() => {

        uiMnu.panelMenu($(".appMenu"));
        uiNoti.panelNotifications($(".appBody"));
  
    });

</script>

  <script>
      function markAllRead() {
          document.querySelectorAll('.notification-item').forEach(item => {
              item.classList.remove('unread');
              item.dataset.status = 'read';
          });
      }

      function applyFilter() {
          const filter = document.getElementById('filter').value;
          document.querySelectorAll('.notification-item').forEach(item => {
              if (filter === 'unread' && item.dataset.status !== 'unread') {
                  item.style.display = 'none';
              } else {
                  item.style.display = 'block';
              }
          });
      }
  </script>
