  <style>

    .notification-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
    }

    .notification-item {
      padding: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    .notification-item:last-child {
      border-bottom: none;
    }

    .unread {
      background-color: #eef2ff;
    }

    .icon-box {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #fff;
    }

    .icon-course {
      background: #4f46e5;
    }

    .icon-alert {
      background: #ef4444;
    }

    .icon-update {
      background: #22c55e;
    }

 

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
  </style>
<script src="APP_SCRIPT/uiMenu.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script src="APP_SCRIPT/uiNotifications.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script defer>

    $(document).ready(() => {

        let uiMnu = new uiMenu();
        let uiNoti = new uiNotifications();

        uiMnu.panelMenu($(".appMenu"));
        uiNoti.panelNotifications($(".appBody"));
  
    });

</script>

  <script>
      function markAllRead() {
          document.querySelectorAll('.notification-item').forEach(item => {
              item.classList.remove('unread');
              item.dataset.status = 'read';
          });
      }

      function applyFilter() {
          const filter = document.getElementById('filter').value;
          document.querySelectorAll('.notification-item').forEach(item => {
              if (filter === 'unread' && item.dataset.status !== 'unread') {
                  item.style.display = 'none';
              } else {
                  item.style.display = 'block';
              }
          });
      }
  </script>
