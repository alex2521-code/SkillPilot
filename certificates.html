       <style>
        body {
            background: #f5f7fa;
            font-family: 'Poppins', sans-serif;
        }

        /* Card Certificate */
        .certificate-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Top Design */
/*        .certificate-header {
            height: 120px;
            background: linear-gradient(135deg, #0d3b66, #1e6091);
            position: relative;
        }*/


.certificate-header {
    height: 120px;
    position: relative;
    background: linear-gradient(135deg, #4b0082, #6a0dad, #8a2be2);
    box-shadow: inset 0 -10px 20px rgba(255,255,255,0.15),
                inset 0 10px 20px rgba(0,0,0,0.25);
    overflow: hidden;
}

/* แสงเงาวิ่ง */
.certificate-header::before {
    content: "";
    position: absolute;
    top: 0;
    left: -50%;
    width: 200%;
    height: 100%;
    background: linear-gradient(120deg,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.05)
    );
    transform: skewX(-25deg);
}

.certificate-header::after {
    content: "";
    position: absolute;
    bottom: -40px;
    left: 0;
    width: 100%;
    height: 80px;
    background: linear-gradient(to right, rgba(0,0,0,0.1), rgba(0,0,0,0.3), rgba(0,0,0,0.25));
    transform: skewY(-25deg);
}
/*            .certificate-header::after {
                content: "";
                position: absolute;
                bottom: -40px;
                left: 0;
                width: 100%;
                height: 80px;
                background: #fff;
                transform: skewY(-5deg);
            }*/

        /* Logo */
        .logo {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #fff;
            font-weight: bold;
        }

        /* Body */
        .certificate-body {
            padding: 40px 25px 25px;
            text-align: center;
        }

        .certificate-title {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .certificate-sub {
            font-size: 14px;
            color: #777;
        }

        .certificate-name {
            font-family: 'Great Vibes', cursive;
            font-size: 34px;
            color: #0d3b66;
            border-bottom: 2px dotted #999;
            display: inline-block;
            margin: 15px 0;
            padding-bottom: 5px;
        }

        /* Footer */
        .certificate-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            font-size: 12px;
        }

        .footer-line {
            border-top: 1px dotted #000;
            width: 120px;
            margin: auto;
            margin-bottom: 5px;
        }

        /* Badge */
        .badge-award {
            position: absolute;
            top: 90px;
            right: 20px;
            background: gold;
            color: #000;
            font-size: 10px;
            padding: 8px 10px;
            border-radius: 50%;
            font-weight: bold;
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }
    </style>
