<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>AI Training Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --bg-grad: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body {
            background: var(--bg-grad);
            font-family: "Inter", "Sarabun", sans-serif;
            min-height: 100vh;
            color: #1e293b;
        }

        /* ===== PROGRESS BAR ===== */
        .stepper-wrapper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            position: relative;
        }
        .stepper-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            z-index: 2;
        }
        .step-counter {
            width: 35px;
            height: 35px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-bottom: 6px;
            transition: 0.3s;
        }
        .stepper-item.active .step-counter {
            background: #4f46e5;
            color: white;
            border-color: #4f46e5;
        }
        .stepper-item.completed .step-counter {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        /* ===== CARD ===== */
        .form-card {
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.8);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        .section-title {
            font-weight: 700;
            color: #334155;
            border-left: 4px solid #4f46e5;
            padding-left: 12px;
            margin-bottom: 20px;
        }

        /* ===== FORM ELEMENTS ===== */
        .form-label { font-weight: 500; font-size: 0.9rem; color: #64748b; }
        .form-control, .form-select {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #e2e8f0;
            background-color: #fcfcfc;
        }
        .form-control:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: #6366f1;
        }

        /* ===== INTEREST CARDS ===== */
        .interest-card {
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: white;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        .interest-card:hover {
            transform: translateY(-3px);
            border-color: #c7d2fe;
        }
        .interest-card.active {
            background: #eef2ff;
            border-color: #4f46e5;
            color: #4f46e5;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1);
        }

        /* ===== BUTTONS ===== */
        .btn-primary {
            background: var(--primary-grad);
            border: none;
            border-radius: 12px;
            padding: 12px 30px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-primary:hover { transform: scale(1.02); opacity: 0.95; }
        .btn-light { border-radius: 12px; padding: 12px 30px; background: #f1f5f9; }

        /* ANIMATIONS */
        .fade-step { animation: fadeInRight 0.4s ease-out; }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(15px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>

<body>

<div class="container py-1">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="text-center mb-1">
                <h2 class="fw-bold">AI Training Registration</h2>
                <p class="text-muted">Join the future of technology</p>
            </div>

            <div class="stepper-wrapper">
                <div class="stepper-item completed" id="s1">
                    <div class="step-counter"><i class="bi bi-check"></i></div>
                    <div class="step-name text-muted" style="font-size: 12px;">Account</div>
                </div>
                <div class="stepper-item active" id="s2">
                    <div class="step-counter">2</div>
                    <div class="step-name fw-bold" style="font-size: 12px;">Personal Info</div>
                </div>
                <div class="stepper-item" id="s3">
                    <div class="step-counter">3</div>
                    <div class="step-name text-muted" style="font-size: 12px;">Preferences</div>
                </div>
            </div>

            <div id="regForm" class="card form-card p-4 p-md-5">

                <div id="step2Content" class="fade-step">
                    <h5 class="section-title">Applicant Information</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Full Name (Thai)</label>
                            <input class="form-control" placeholder="ชื่อ-นามสกุล" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Full Name (English)</label>
                            <input class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="col-md-12">
                            <label class="form-label">National ID (13 digits)</label>
                            <input class="form-control" placeholder="x-xxxx-xxxxx-xx-x" pattern="\d{13}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="name@company.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Phone Number</label>
                            <input class="form-control" placeholder="08x-xxx-xxxx" required>
                        </div>
                    </div>

                    <h5 class="section-title mt-4">Organization & Course</h5>
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Company</label>
                            <input class="form-control" placeholder="Organization Name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Course</label>
                            <select class="form-select">
                                <option>AI Fundamentals</option>
                                <option>Generative AI for Business</option>
                                <option>Deep Learning Specialization</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="step3Content" class="d-none fade-step">
                    <h5 class="section-title">Dietary Requirements</h5>
                    <div class="d-flex flex-wrap gap-3 mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="none">
                            <label class="form-check-label" for="none">None</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="veg">
                            <label class="form-check-label" for="veg">Vegetarian</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="halal">
                            <label class="form-check-label" for="halal">Halal</label>
                        </div>
                    </div>

                    <h5 class="section-title">Areas of Interest</h5>
                    <p class="small text-muted mb-2">Select all that apply to you</p>
                    <div class="row g-3 mb-4" id="interestContainer">
                        </div>
                    
                    <h5 class="section-title">Special Requirements</h5>
                    <textarea class="form-control" rows="3" placeholder="Any additional notes..."></textarea>
                </div>

                <div class="d-flex justify-content-between mt-2 border-top pt-2">
                    <button type="button" id="prevBtn" class="btn btn-light text-secondary">
                        <i class="bi bi-arrow-left me-2"></i>Back
                    </button>
                    <button type="button" id="nextBtn" class="btn btn-primary px-5">
                        Next <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
$(function () {
    let currentStep = 2;
    const topics = ["Machine Learning", "NLP", "Computer Vision", "Generative AI", "AI Ethics", "Data Science", "Robotics", "Prompt Eng."];

    // Initialize Interests
    const topicHtml = topics.map(t => `
        <div class="col-6 col-md-3">
            <div class="interest-card">
                ${t}
            </div>
        </div>
    `).join("");
    $("#interestContainer").html(topicHtml);

    function updateUI() {
        if (currentStep === 2) {
            $("#step2Content").removeClass("d-none");
            $("#step3Content").addClass("d-none");
            
            $("#s2").addClass("active").removeClass("completed");
            $("#s3").removeClass("active completed");
            
            $("#prevBtn").css("visibility", "visible"); // or "hidden" if you want to hide back on step 2
            $("#nextBtn").html('Next <i class="bi bi-arrow-right ms-2"></i>');
        } else if (currentStep === 3) {
            $("#step2Content").addClass("d-none");
            $("#step3Content").removeClass("d-none");
            
            $("#s2").addClass("completed").removeClass("active");
            $("#s3").addClass("active");
            
            $("#nextBtn").html('Submit Registration <i class="bi bi-check-lg ms-2"></i>');
        }
    }

    $("#nextBtn").on("click", function () {
        if (currentStep === 2) {
            currentStep = 3;
            updateUI();
        } else {
            alert("Registration Submitted Successfully! ✅");
        }
    });

    $("#prevBtn").on("click", function () {
        if (currentStep === 3) {
            currentStep = 2;
            updateUI();
        }
    });

    $(document).on("click", ".interest-card", function () {
        $(this).toggleClass("active");
    });
});
</script>
</body>
</html>
