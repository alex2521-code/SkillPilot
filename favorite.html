
<!DOCTYPE html>


<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aFTI Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" type="text/javascript"></script>

    <link href="APP_STYLE/appStyle.css" rel="stylesheet">
</head>

<body>
    <!-- Content MENU -->
    <div class="appMenu">add Menu heare by .appMenu</div>

    <!-- Content BODY -->
    <div class="content appBody">Load content here by .appBody</div>




</body>
</html>
<script src="APP_SCRIPT/uiMenu.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script src="APP_SCRIPT/uiCourses.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script src="APP_SCRIPT/uiFavorite.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script defer>

    $(document).ready(() => {

        let uiMnu = new uiMenu();
        let uiFav = new uiFavorite();

        uiMnu.panelMenu($(".appMenu"));
        uiFav.panelFavorite($(".appBody"));
  
    });

    function showGrid() {
        document.getElementById("gridView").classList.remove("d-none");
        document.getElementById("listView").classList.add("d-none");
    }
    function showList() {
        document.getElementById("gridView").classList.add("d-none");
        document.getElementById("listView").classList.remove("d-none");
    }

</script>
