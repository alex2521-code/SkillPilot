<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fb;
    }
    .register-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .register-logo {
      width: 60px;
      height: 60px;
      background-color: #4f46e5;
      color: #fff;
      font-size: 26px;
      font-weight: 600;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .form-control {
      border-radius: 10px;
    }
    .btn-primary {
      border-radius: 10px;
      padding: 10px;
    }
    .strength-bar {
      height: 6px;
      border-radius: 5px;
      background-color: #e5e7eb;
      overflow: hidden;
    }
    .strength-bar div {
      height: 100%;
      width: 0%;
      transition: width .3s;
    }
    .text-link {
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row min-vh-100 align-items-center justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="card register-card p-4">
        <div class="card-body">

          <!-- Logo -->
          <div class="register-logo">
            <img width='100' src='project.png' />
          </div>

          <h4 class="text-center mb-4 fw-semibold">
            Create an account
          </h4>

          <!-- Registration Form -->
          <form>

            <div class="mb-3">
              <label class="form-label">Full name</label>
              <input type="text" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" placeholder="you@example.com" required>
            </div>

            <div class="mb-2">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="••••••••"
                onkeyup="checkStrength(this.value)"
                required
              >
            </div>

            <!-- Password strength -->
            <div class="mb-3">
              <div class="strength-bar">
                <div id="strengthIndicator"></div>
              </div>
              <small id="strengthText" class="text-muted text-link"></small>
            </div>

            <div class="mb-3">
              <label class="form-label">Confirm password</label>
              <input type="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="terms" required>
              <label class="form-check-label text-link" for="terms">
                I agree to the
                <a href="terms.html" class="text-decoration-none">Terms & Conditions</a>
              </label>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">
                Create account
              </button>
            </div>
          </form>

          <div class="text-center mt-4">
            <span class="text-muted text-link">
              Already have an account?
            </span>
            <a href="index.html" class="text-decoration-none text-link fw-semibold">
              Login
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- Password strength script -->
<script>
  function checkStrength(password) {
    const indicator = document.getElementById("strengthIndicator");
    const text = document.getElementById("strengthText");

    let strength = 0;
    if (password.length >= 6) strength++;
    if (/[A-Z]/.test(password)) strength++;
    if (/[0-9]/.test(password)) strength++;
    if (/[^A-Za-z0-9]/.test(password)) strength++;

    if (strength <= 1) {
      indicator.style.width = "25%";
      indicator.style.backgroundColor = "#ef4444";
      text.innerText = "Weak password";
    } else if (strength === 2 || strength === 3) {
      indicator.style.width = "60%";
      indicator.style.backgroundColor = "#f59e0b";
      text.innerText = "Medium strength";
    } else {
      indicator.style.width = "100%";
      indicator.style.backgroundColor = "#22c55e";
      text.innerText = "Strong password";
    }

    if (password.length === 0) {
      indicator.style.width = "0%";
      text.innerText = "";
    }
  }
</script>

</body>
</html>
