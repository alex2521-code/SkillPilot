<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Admin Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f5f7fb;
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            overflow-x: hidden;
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 260px;
            height: 100vh;
            background: #ffffff;
            box-shadow: 2px 0 10px rgba(0, 0, 0, .05);
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1050;
        }

        .sidebar .nav-link {
            color: #374151;
            border-radius: 10px;
            margin: 4px 12px;
            font-weight: 500;
            position: relative;
            transition: all 0.25s ease;
        }

        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            background: #f1f5ff;
            color: #4f46e5;
        }

        .sidebar .nav-link i {
            margin-right: 10px;
        }

        /* ===== Header & Content Adaptability ===== */
        .topbar {
            height: 64px;
            background: #ffffff;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
            margin-left: 260px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
        }

        .content {
            margin-left: 260px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        /* ===== Responsive Logic ===== */
        @media (max-width: 991.98px) {
            .sidebar {
                margin-left: -260px; /* Hide sidebar by default on mobile/tablet */
            }
            .sidebar.active {
                margin-left: 0; /* Show when active */
            }
            .topbar, .content {
                margin-left: 0; /* Full width on mobile */
            }
            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                z-index: 1040;
            }
            .overlay.active {
                display: block;
            }
        }

        /* Avatar & Logos */
        .avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            background: #4f46e5; color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; flex-shrink: 0;
        }

        .header-logo {
            height: 32px;
            flex-shrink: 0;
        }

        .header-icons {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
        }
        
        .header-icons::-webkit-scrollbar { height: 0; }

        .hamburger {
            cursor: pointer;
            font-size: 24px;
            display: none;
        }

        @media (max-width: 991.98px) {
            .hamburger { display: block; }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="p-3 d-flex justify-content-between align-items-center">
            <div class="fw-bold fs-5 text-primary">
                <img width='120' src="images/logo/Logo_AFTI2.png" alt="Logo" />
            </div>
            <button class="btn d-lg-none" onclick="toggleSidebar()"><i class="bi bi-x-lg"></i></button>
        </div>

        <nav class="nav flex-column" id="sidebarMenu">
            <a class="nav-link active" href="#"><i class="bi bi-speedometer2"></i>Dashboard</a>
            <a class="nav-link" href="#"><i class="bi bi-book"></i>Courses</a>
            <a class="nav-link" href="#"><i class="bi bi-stars"></i>Recommended</a>
            <a class="nav-link" href="#"><i class="bi bi-heart"></i>Favorite</a>
            <a class="nav-link" href="#"><i class="bi bi-clock-history"></i>My Enrollment</a>
            <a class="nav-link" href="#"><i class="bi bi-patch-check"></i>Certificates</a>
            <a class="nav-link" href="#"><i class="bi bi-bell"></i>Notifications</a>
            <a class="nav-link" href="#"><i class="bi bi-person-circle"></i>Profile</a>
        </nav>

        <div class="mt-auto p-3 border-top d-flex align-items-center gap-3">
            <div class="avatar">SP</div>
            <div class="overflow-hidden">
                <div class="fw-semibold text-truncate">Admin User</div>
                <small class="text-muted text-truncate d-block">admin@tailpanel.com</small>
            </div>
        </div>
    </div>

    <div class="topbar">
        <div class="d-flex align-items-center gap-3 w-100">
            <i class="bi bi-list hamburger" onclick="toggleSidebar()"></i>
            
            <div class="header-icons">
                <img src="images/logo/Logo_MHESI.png" class="header-logo" />
                <img src="images/logo/Logo_PMUB.png" class="header-logo" />
                <img src="images/logo/Logo_FTI.svg" class="header-logo" />
                <img src="images/logo/Logo_AIEI.png" class="header-logo" />
                <img src="images/logo/Logo_MU.jpg" class="header-logo" />
                <img src="images/logo/Logo_AWS.png" class="header-logo" />
                <img src="images/logo/Logo_SIS.png" class="header-logo" />
            </div>
        </div>
    </div>

    <div class="content">
        <div class="mb-4">
            <h4 class="fw-bold">Overview of your learning progress</h4>
            <p class="text-muted">Welcome back, Admin! Here is what's happening today.</p>
        </div>

        <div class="row g-3">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card border-0 shadow-sm p-3">
                    <h5 class="text-muted small">Total Courses</h5>
                    <h3>24</h3>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-4">
                <div class="card border-0 shadow-sm p-3">
                    <h5 class="text-muted small">In Progress</h5>
                    <h3>12</h3>
                </div>
            </div>
            <div class="col-12 col-md-12 col-lg-4">
                <div class="card border-0 shadow-sm p-3">
                    <h5 class="text-muted small">Completed</h5>
                    <h3>8</h3>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
        }

        // Close sidebar when clicking overlay
        document.getElementById('overlay').addEventListener('click', toggleSidebar);
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
