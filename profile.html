<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Admin Layout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f5f7fb;
      margin: 0;
      font-family: "Segoe UI", sans-serif;
    }

    .profile-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #fff;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
    }

    .stat-card {
      border-radius: 14px;
      background-color: #eef2ff;
      color: #4338ca;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* ===== Sidebar ===== */
    .sidebar {
      width: 260px;
      height: 100vh;
      background: #ffffff;
      box-shadow: 2px 0 10px rgba(0, 0, 0, .05);
      position: fixed;
      display: flex;
      flex-direction: column;
    }

    .sidebar .nav-link {
      color: #374151;
      border-radius: 10px;
      margin: 4px 12px;
      font-weight: 500;
      position: relative;
      transition: all 0.25s ease;
    }

    /* Hover */
    .sidebar .nav-link:hover {
      background: #f1f5ff;
      color: #4f46e5;
      transform: translateX(5px);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
    }

    .sidebar .nav-link i {
      margin-right: 10px;
      transition: all 0.25s ease;
    }

    .sidebar .nav-link:hover i {
      transform: scale(1.1);
    }

    /* Left border effect */
    .sidebar .nav-link::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 0;
      height: 60%;
      background: #4f46e5;
      border-radius: 0 4px 4px 0;
      transition: width 0.25s ease;
    }

    .sidebar .nav-link:hover::before {
      width: 4px;
    }

    /* Active */
    .sidebar .nav-link.active {
      background: linear-gradient(90deg, #eef2ff, #f8faff);
      color: #4f46e5;
    }

    .sidebar .nav-link.active::before {
      width: 4px;
    }

    /* ===== Header ===== */
    .topbar {
      height: 64px;
      background: #ffffff;
      box-shadow: 0 2px 10px rgba(0, 0, 0, .05);
      margin-left: 260px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .search-input {
      max-width: 320px;
    }

    /* ===== Content ===== */
    .content {
      margin-left: 260px;
      margin-top: 0px;
      padding: 24px;
    }

    /* Avatar */
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #4f46e5;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">

    <div class="p-3 fw-bold fs-5 text-primary">
      <img width='80' src='project.png' class='me-2'></img> SkillPilot
    </div>


    <nav class="nav flex-column" id="sidebarMenu">

      <a class="nav-link" href="dashboard.html">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>

      <a class="nav-link" href="courses.html">
        <i class="bi bi-book"></i> Courses
      </a>

      <a class="nav-link" href="recommendedCourses.html">
        <i class="bi bi-stars"></i> Recommended
      </a>

      <a class="nav-link" href="favoriteCourses.html">
        <i class="bi bi-heart"></i> Favorite
      </a>
      
      <a class="nav-link" href="courseHistory.html">
        <i class="bi bi-clock-history"></i> My Enrollment
      </a>

      <a class="nav-link" href="certificates.html">
        <i class="bi bi-patch-check"></i> Certificates
      </a>

      <a class="nav-link" href="notifications.html">
        <i class="bi bi-bell"></i> Notifications
      </a>

      <a class="nav-link active" href="profile.html">
        <i class="bi bi-person-circle"></i> Profile
      </a>

    </nav>


    <!-- Account -->
    <div class="mt-auto p-3 border-top d-flex align-items-center gap-3">
      <div class="avatar">SP</div>
      <div>
        <div class="fw-semibold">Admin User</div>
        <small class="text-muted">admin@tailpanel.com</small>
      </div>
    </div>

  </div>

  <!-- Header -->
  <div class="topbar">
    <input class="form-control search-input" placeholder="Search...">

    <div class="d-flex align-items-center gap-3">
      <i class="bi bi-gear fs-5"></i>
      <i class="bi bi-bell fs-5"></i>
      <div class="avatar">SP</div>
    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <div class="container">

      <div class="row g-4">

        <!-- Left: Profile Summary -->
        <div class="col-lg-4">

          <div class="card profile-card text-center p-4">
            https://i.pravatar.cc/300
            <h5 class="mt-3 mb-1">John Doe</h5>
            <p class="text-muted mb-3">john.doe@example.com</p>

            <div class="d-grid mb-3">
              <button class="btn btn-outline-primary">
                Edit Profile
              </button>
            </div>

            <!-- Enrolled Courses -->
            <div class="stat-card p-3">
              <h3 class="fw-bold mb-0">12</h3>
              <span class="text-muted">Enrolled Courses</span>
            </div>
          </div>

        </div>

        <!-- Right: Profile Details -->
        <div class="col-lg-8">

          <!-- Profile Info -->
          <div class="card profile-card p-4 mb-4">
            <div class="section-title">Profile Information</div>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full name</label>
                <input type="text" class="form-control" value="John Doe" disabled>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" value="john.doe@example.com" disabled>
              </div>
            </div>
          </div>

          <!-- Change Password -->
          <div class="card profile-card p-4">
            <div class="section-title">Change Password</div>

            <form>
              <div class="mb-3">
                <label class="form-label">Current password</label>
                <input type="password" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label">New password</label>
                <input type="password" class="form-control">
              </div>

              <div class="mb-4">
                <label class="form-label">Confirm new password</label>
                <input type="password" class="form-control">
              </div>

              <button type="submit" class="btn btn-primary">
                Update Password
              </button>
            </form>
          </div>

        </div>

      </div>

    </div>
  </div>

  <!-- JS: Active Menu -->
  <script>
    document.querySelectorAll('#sidebarMenu .nav-link').forEach(link => {
      link.addEventListener('click', function () {
        document.querySelectorAll('#sidebarMenu .nav-link')
          .forEach(el => el.classList.remove('active'));

        this.classList.add('active');
      });
    });
  </script>

</body>

</html>
