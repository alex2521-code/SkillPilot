
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aFTI Courses</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" type="text/javascript"></script>

    <link href="APP_STYLE/appStyle.css" rel="stylesheet">
    <style>
        :root {/*#EAE1F7;#e5c9c1;#769796*/
            --sidebar-color: #b6aebd; /* สีตามเทมเพลต */
            --header-bg: #d1d9e6; /* สีชมพูอ่อนตามเทมเพลต */
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
        }


        .profile-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            display: flex;
        }

        /* Sidebar */
        .sidebar-profile {
            background-color: var(--sidebar-color);
            color: white;

        }

        .profile-img-container {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid rgba(255,255,255,0.5);
            overflow: hidden;
            margin: 0 auto 30px;
        }

            .profile-img-container img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

/*        .sidebar-section {
            margin-bottom: 40px;
        }

        .sidebar-title {
            font-weight: 600;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }*/

        /* Main Content */
        .main-content {
            width: 65%;
            background: white;
        }

        .header-banner {
            background-color: var(--header-bg);
            padding: 50px 40px;
            color: #444;
        }

            .header-banner h1 {
                font-weight: 600;
                font-size: 2.5rem;
                margin: 0;
                color: #333;
                text-transform: uppercase;
            }

        .content-body {
            padding: 40px;
        }

        .info-group {
            margin-bottom: 30px;
        }

        .info-title {
            display: flex;
            align-items: center;
            color: var(--sidebar-color);
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

            .info-title i {
                margin-right: 10px;
                font-size: 1.2rem;
            }

        /* Interest Badges */
        .badge-interest {
            background: #f0f4f8;
            border: 1px solid #d1d9e6;
            color: #555;
            padding: 8px 15px;
            border-radius: 10px;
            display: inline-block;
            margin: 0 5px 10px 0;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

            .badge-interest.active {
                background: linear-gradient(135deg, #3b82f6, #2563eb);
                color: white;
                border: none;
                box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
            }

        @media (max-width: 768px) {
            .profile-card {
                flex-direction: column;
            }


        }
    </style>



</head>

<body>
    <!-- Content MENU -->
    <div class="appMenu">add Menu heare by .appMenu</div>

    <!-- Content BODY -->
    <div class="content appBody">Load content here by .appBody</div>




</body>
</html>
<script src="APP_SCRIPT/uiMenu.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script src="APP_SCRIPT/uiProfile.js?ver<%=DateTime.Now.Ticks.ToString()%>"  type="text/javascript" ></script>
<script defer>

    $(document).ready(() => {

        let uiMnu = new uiMenu();
        let uiPf = new uiProfile();

        uiMnu.panelMenu($(".appMenu"));
        uiPf.panelProfile($(".appBody"));
  
    });

</script>
