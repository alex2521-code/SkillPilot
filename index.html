        body {
            margin: 0;
            font-family: "Inter", system-ui;
            background: #f8f9fa;
            overflow-x: hidden;
        }

        /* ---------- HEADER ---------- */
        .sticky-top {

        .header-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;

            gap: 10px;
            overflow-x: auto;
        }

                display: none;
            }

        /* ---------- BACKGROUND ---------- */
        body::before {
            content: "";
            position: fixed;
            top: 50px;
            width: 100%;
            height: calc(100vh - 50px);
            background: url("images/afti_bg.png") center/cover no-repeat;
            opacity: 0.6;
            z-index: -2;

        canvas#bg {

            top: 70px;

        }

        /* ---------- CARD ---------- */

            max-width: 420px;
            margin: auto;
        }

        .login-card {
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* ---------- FORM ---------- */
        .form-control {
            height: 42px;
        }

        .btn {
            padding: 10px;
            border-radius: 10px;
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 18px;
            }

            h4 {
                font-size: 1.2rem;
            }

            .form-control {
                font-size: 0.9rem;
            }

            .project-logo {
                display: none;
            }
        }


        
        /* Glass Modal Style */
        .glass-modal {
            background: rgba(15, 20, 40, 0.65);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 0 40px rgba(0, 195, 255, 0.25), inset 0 0 30px rgba(255,255,255,0.05);
            color: #fff;
        }

        /* XXL width fine-tune (optional) */

                max-width: 800px;
            }
        }

        /* Soft glowing title */
        .glass-modal .modal-title {
            background: linear-gradient(90deg, #ff003c, #7b2cff, #00c3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Button glow */
        .glass-modal .btn-outline-light {
            border-radius: 999px;
            border-color: rgba(255,255,255,0.5);
            transition: all .3s ease;
        }

            .glass-modal .btn-outline-light:hover {
                background: rgba(255,255,255,0.15);
                box-shadow: 0 0 20px #00c3ff;
            }

    </style>
</head>

            $(".sectionSignUp").addClass("d-none");
            $(".sectionLogin").removeClass("d-none");
            $(".sectionLogin")
                .fadeOut()
                .fadeIn(300);
        });

        



    });

    var modalInstance;
    function openModal(lock = false) {

        $('#glassModal .modal-body').html(pnlTerm);
        const modalEl = $('#glassModal')[0];

        modalInstance = new bootstrap.Modal(modalEl, {
            backdrop: lock ? 'static' : true,
            keyboard: !lock
        });

        modalInstance.show();
    }

    function closeModal() {
        if (modalInstance) {
            modalInstance.hide();
        }
    }

</script>


<script>
    const c = document.getElementById("bg");
    const ctx = c.getContext("2d");

    function resize() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    let t = 0;

    // ✅ dynamic line size
    let lineSize = 1;
    let direction = 1;

    // ✅ change size every 3 seconds
    setInterval(() => {
        lineSize += direction;

        if (lineSize >= 30) direction = -1;
        if (lineSize <= 1) direction = 1;
    }, 300);

    function draw() {
        ctx.clearRect(0, 0, c.width, c.height);

        ctx.strokeStyle = "rgba(0,255,200,0.6)";
        ctx.lineWidth = lineSize;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.beginPath();

        for (let x = 0; x < c.width; x += 8) {
            let y = c.height / 2 + Math.sin(x * 0.01 + t) * 100;
            ctx.lineTo(x, y);
        }

        ctx.stroke();

        t += 0.03;
        requestAnimationFrame(draw);
    }

    draw();
</script>



<!-- Password strength script -->
<script>
    function checkStrength(password) {
        const indicator = document.getElementById("strengthIndicator");
        const text = document.getElementById("strengthText");

        let strength = 0;
        if (password.length >= 6) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        if (strength <= 1) {
            indicator.style.width = "25%";
            indicator.style.backgroundColor = "#ef4444";
            text.innerText = "Weak password";
        } else if (strength === 2 || strength === 3) {
            indicator.style.width = "60%";
            indicator.style.backgroundColor = "#f59e0b";
            text.innerText = "Medium strength";
        } else {
            indicator.style.width = "100%";
            indicator.style.backgroundColor = "#22c55e";
            text.innerText = "Strong password";
        }

        if (password.length === 0) {
            indicator.style.width = "0%";
            text.innerText = "";
        }
    }
</script>
