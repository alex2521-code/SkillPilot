<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head runat="server">
    <title>AFTI Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>

/* ---------- BASE ---------- */
body {
    margin: 0;
    font-family: "Inter", system-ui;
    background: #f8f9fa;
    overflow-x: hidden;
}

/* ---------- HEADER ---------- */
.sticky-top {
    background: #fff;
    z-index: 1000;
}

.header-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
}

.header-logo {
    height: clamp(28px, 4vw, 42px);
    flex-shrink: 0;
}

.header-icons {
    display: flex;
    gap: 10px;
    overflow-x: auto;
}

.header-icons::-webkit-scrollbar {
    display: none;
}

/* ---------- BACKGROUND ---------- */
body::before {
    content: "";
    position: fixed;
    top: 50px;
    width: 100%;
    height: calc(100vh - 50px);
    background: url("images/afti_bg.png") center/cover no-repeat;
    opacity: 0.6;
    z-index: -2;
}

canvas#bg {
    position: fixed;
    top: 70px;
    width: 100%;
    height: calc(100vh - 70px);
    z-index: -1;
}

/* ---------- MAIN ---------- */
.main-content {
    padding: clamp(80px, 10vh, 120px) 12px 40px;
}

/* ---------- CARD ---------- */
.login-wrapper {
    max-width: 420px;
    margin: auto;
}

.login-card {
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

/* ---------- FORM ---------- */
.form-control {
    height: 42px;
}

.btn {
    padding: 10px;
    border-radius: 10px;
}

/* ---------- MOBILE ---------- */
@media (max-width: 576px) {
    .login-card {
        padding: 18px;
    }

    h4 {
        font-size: 1.2rem;
    }

    .form-control {
        font-size: 0.9rem;
    }

    .project-logo{
        display:none;
    }
}

    </style>
</head>

<body>

<!-- Canvas -->
<canvas id="bg"></canvas>

<form id="form1" runat="server">

    <!-- HEADER -->
    <div class="container-fluid sticky-top">
        <div class="container header-bar">

            <!-- LEFT -->
            <img src="images/logo/Logo_AFTI2.png" class="header-logo project-logo" />

            <!-- RIGHT -->
            <div class="header-icons">
                <img src="images/logo/Logo_MHESI.png" class="header-logo" />
                <img src="images/logo/Logo_PMUB.png" class="header-logo" />
                <img src="images/logo/Logo_FTI.svg" class="header-logo" />
                <img src="images/logo/Logo_AIEI.png" class="header-logo" />
                <img src="images/logo/Logo_MU.jpg" class="header-logo" />
                <img src="images/logo/Logo_AWS.png" class="header-logo" />
                <img src="images/logo/Logo_SIS.png" class="header-logo" />
            </div>

        </div>
    </div>

    <!-- CONTENT -->
    <div class="container main-content">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="login-wrapper">
                    <div class="card login-card">

                        <div class="text-center mb-3">
                            <img src="images/logo/Logo_Flat_AFTI.png" height="40" />
                        </div>

                        <h4 class="text-center mb-4 fw-semibold">
                            Sign in to your account
                        </h4>

                        <div class="mb-3">
                            <label>Email</label>
                            <input type="email" class="form-control" placeholder="you@example.com" />
                        </div>

                        <div class="mb-3">
                            <label>Password</label>
                            <input type="password" class="form-control" placeholder="Password" />
                        </div>

                        <div class="d-flex justify-content-between mb-3 small">
                            <div>
                                <input type="checkbox" /> Remember me
                            </div>
                            <a href="#">Forgot password?</a>
                        </div>

                        <div class="d-grid">
                            <a href="intro.html" class="btn btn-primary">Login
                            </a>
                        </div>
                        <hr />
                        <div class="text-center mt-2">
                            <span class="text-muted text-link">Don’t have an account?
                            </span>
                            <a href="signup.html" class="text-decoration-none text-link fw-semibold">Sign up
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</form>

<script>
    const c = document.getElementById("bg");
    const ctx = c.getContext("2d");

    function resize() {
        c.width = window.innerWidth;
        c.height = window.innerHeight;
    }
    window.addEventListener("resize", resize);
    resize();

    let t = 0;

    // ✅ dynamic line size
    let lineSize = 1;
    let direction = 1;

    // ✅ change size every 3 seconds
    setInterval(() => {
        lineSize += direction;

        if (lineSize >= 30) direction = -1;
        if (lineSize <= 1) direction = 1;
    }, 300);

    function draw() {
        ctx.clearRect(0, 0, c.width, c.height);

        ctx.strokeStyle = "rgba(0,255,200,0.6)";
        ctx.lineWidth = lineSize;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        ctx.beginPath();

        for (let x = 0; x < c.width; x += 8) {
            let y = c.height / 2 + Math.sin(x * 0.01 + t) * 100;
            ctx.lineTo(x, y);
        }

        ctx.stroke();

        t += 0.03;
        requestAnimationFrame(draw);
    }

    draw();
</script>


</body>
</html>
