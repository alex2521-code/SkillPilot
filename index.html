<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      background-color: #f5f7fb;
    }
    .login-card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .login-logo {
      width: 60px;
      height: 60px;
      background-color: #4f46e5;
      color: #fff;
      font-size: 28px;
      font-weight: 600;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .form-control {
      border-radius: 10px;
    }
    .btn-primary {
      border-radius: 10px;
      padding: 10px;
    }
    .text-link {
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row min-vh-100 align-items-center justify-content-center">
    <div class="col-md-5 col-lg-4">

      <div class="card login-card p-4">
        <div class="card-body">

          <!-- Logo -->
          <div class="login-logo">
            <img width='100' src='project.png' />
          </div>

          <h4 class="text-center mb-4 fw-semibold">Sign in to your account</h4>

          <!-- Login Form -->
          <form>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                placeholder="you@example.com"
                required
	value="test@example.com"
              >
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                class="form-control"
                placeholder="••••••••"
                required
              >
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember">
                <label class="form-check-label text-link" for="remember">
                  Remember me
                </label>
              </div>
              <a href="#" class="text-decoration-none text-link">
                Forgot password?
              </a>
            </div>

            <div class="d-grid">
              <a type="submit" class="btn btn-primary form-control" target='app' href="dashboard.html">
                Login
              </a>
            </div>
          </form>

          <div class="text-center mt-4">
            <span class="text-muted text-link">
              Don’t have an account?
            </span>
            <a href="signup.html" class="text-decoration-none text-link fw-semibold">
              Sign up
            </a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
